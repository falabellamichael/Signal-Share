<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Pinball | Signal Share</title>
    <style>
        :root {
            --neon-magenta: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-blue: #4d4dff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1b2838 0%, #000 100%);
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #gameUI {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat-group {
            display: flex;
            gap: 15px;
        }

        .score-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            text-align: center;
            min-width: 80px;
        }

        .score-label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            opacity: 0.5;
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            line-height: 1;
        }

        #game-canvas-container {
            position: relative;
            height: 85vh;
            aspect-ratio: 4/7;
            background: #080810;
            border: 2px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(77, 77, 255, 0.1);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #particle-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.3s;
        }

        .play-btn {
            background: linear-gradient(to bottom, var(--neon-magenta), #cc00cc);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
            margin-top: 20px;
            width: 250px;
            transition: transform 0.2s;
        }

        .play-btn:hover { transform: scale(1.05); }

        .controls-hint {
            margin-top: 30px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
            line-height: 2;
        }

        .key-cap {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--neon-cyan);
            font-weight: 800;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="gameUI">
        <div class="stat-group">
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">BALLS</div>
                <div class="score-value" id="balls" style="color: var(--neon-magenta); text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);">3</div>
            </div>
        </div>
        <div class="stat-group">
            <div class="score-box">
                <div class="score-label">BEST</div>
                <div class="score-value" id="highScore" style="color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); font-size: 1.4rem;">0</div>
            </div>
        </div>
    </div>

    <div id="game-canvas-container">
        <canvas id="pinballCanvas" width="400" height="700"></canvas>
        <canvas id="particle-canvas" width="400" height="700"></canvas>
    </div>

    <div id="overlay">
        <h1 style="font-size: 4rem; margin: 0; color: var(--neon-magenta); text-shadow: 0 0 20px rgba(255,0,255,0.6); letter-spacing: -3px; font-weight: 900;">NEON PINBALL</h1>
        <p style="opacity: 0.6; font-size: 1.1rem; margin-top: 10px;">SIGNAL SHARE ARCADE EDITION</p>
        
        <button class="play-btn" onclick="startGame()">Start Session</button>

        <div class="controls-hint">
            <p><span class="key-cap">A</span> & <span class="key-cap">D</span> OR <span class="key-cap">←</span> <span class="key-cap">→</span> FLIPPERS</p>
            <p><span class="key-cap">SPACE</span> TO LAUNCH BALL</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pinballCanvas');
        const ctx = canvas.getContext('2d');
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');

        const CONFIG = {
            gravity: 0.32,
            friction: 0.994,
            ballRadius: 10,
            flipperLength: 70,
            flipperWidth: 14,
            flipperSpeed: 0.32,
            flipperMaxAngle: Math.PI / 4,
            flipperMinAngle: -Math.PI / 8
        };

        let score = 0;
        let balls = 3;
        let isPlaying = false;
        let highScore = localStorage.getItem('pinball-best') || 0;
        document.getElementById('highScore').textContent = highScore;

        const ball = { x: 375, y: 650, vx: 0, vy: 0, radius: CONFIG.ballRadius };

        // Adjusted flipper positions to be closer together
        const leftFlipper = { x: 145, y: 650, angle: CONFIG.flipperMinAngle, targetAngle: CONFIG.flipperMinAngle, length: CONFIG.flipperLength, side: 'left', color: var(--neon-cyan) };
        const rightFlipper = { x: 255, y: 650, angle: -CONFIG.flipperMinAngle, targetAngle: -CONFIG.flipperMinAngle, length: CONFIG.flipperLength, side: 'right', color: var(--neon-magenta) };

        // Helper to get color from CSS variable
        function getVar(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        const bumpers = [
            { x: 140, y: 150, r: 25, color: '#ff00ff', points: 100 },
            { x: 260, y: 150, r: 25, color: '#ff00ff', points: 100 },
            { x: 200, y: 240, r: 30, color: '#00ffff', points: 250 },
            { x: 80, y: 350, r: 20, color: '#4d4dff', points: 50 },
            { x: 320, y: 350, r: 20, color: '#4d4dff', points: 50 }
        ];

        // Adjusted walls to funnel toward the closer flippers
        const walls = [
            { x1: 0, y1: 0, x2: 400, y2: 0 },
            { x1: 0, y1: 0, x2: 0, y2: 700 },
            { x1: 400, y1: 0, x2: 400, y2: 700 },
            { x1: 350, y1: 150, x2: 350, y2: 700 },
            { x1: 0, y1: 580, x2: 145, y2: 670 }, // Funnel left
            { x1: 400, y1: 580, x2: 255, y2: 670 }  // Funnel right
        ];

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && ball.y > 600 && ball.x > 350) {
                ball.vy = -20 - Math.random() * 4;
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            score = 0;
            balls = 3;
            updateUI();
            resetBall();
            isPlaying = true;
            requestAnimationFrame(loop);
        }

        function resetBall() {
            ball.x = 375; ball.y = 650; ball.vx = 0; ball.vy = 0;
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('balls').textContent = balls;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('pinball-best', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        function loop() {
            if (!isPlaying) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function update() {
            leftFlipper.targetAngle = keys['KeyA'] || keys['ArrowLeft'] ? CONFIG.flipperMinAngle - CONFIG.flipperMaxAngle : CONFIG.flipperMinAngle;
            rightFlipper.targetAngle = keys['KeyD'] || keys['ArrowRight'] ? -CONFIG.flipperMinAngle + CONFIG.flipperMaxAngle : -CONFIG.flipperMinAngle;

            leftFlipper.angle += (leftFlipper.targetAngle - leftFlipper.angle) * CONFIG.flipperSpeed;
            rightFlipper.angle += (rightFlipper.targetAngle - rightFlipper.angle) * CONFIG.flipperSpeed;

            ball.vy += CONFIG.gravity;
            ball.vx *= CONFIG.friction;
            ball.vy *= CONFIG.friction;
            ball.x += ball.vx;
            ball.y += ball.vy;

            walls.forEach(w => checkWallCollision(w));
            bumpers.forEach(b => {
                const dx = ball.x - b.x, dy = ball.y - b.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < ball.radius + b.r) {
                    const angle = Math.atan2(dy, dx);
                    ball.vx = Math.cos(angle) * 14; ball.vy = Math.sin(angle) * 14;
                    score += b.points; updateUI();
                    createImpactParticles(b.x, b.y, b.color);
                }
            });
            checkFlipperCollision(leftFlipper);
            checkFlipperCollision(rightFlipper);

            if (ball.y > 750) {
                balls--; updateUI();
                if (balls <= 0) gameOver();
                else resetBall();
            }
        }

        function checkWallCollision(w) {
            const dx = w.x2 - w.x1, dy = w.y2 - w.y1, len = Math.sqrt(dx*dx + dy*dy);
            const dot = (((ball.x - w.x1) * dx) + ((ball.y - w.y1) * dy)) / (len * len);
            const closestX = w.x1 + (dot * dx), closestY = w.y1 + (dot * dy);
            if (dot >= 0 && dot <= 1) {
                const dist = Math.sqrt(Math.pow(ball.x - closestX, 2) + Math.pow(ball.y - closestY, 2));
                if (dist < ball.radius) {
                    const nx = -(w.y2 - w.y1) / len, ny = (w.x2 - w.x1) / len;
                    const dotProduct = ball.vx * nx + ball.vy * ny;
                    ball.vx -= 2 * dotProduct * nx; ball.vy -= 2 * dotProduct * ny;
                    ball.x = closestX + nx * ball.radius; ball.y = closestY + ny * ball.radius;
                }
            }
        }

        function checkFlipperCollision(f) {
            const x2 = f.x + Math.cos(f.angle) * f.length, y2 = f.y + Math.sin(f.angle) * f.length;
            const dx = x2 - f.x, dy = y2 - f.y, len = Math.sqrt(dx*dx + dy*dy);
            const dot = (((ball.x - f.x) * dx) + ((ball.y - f.y) * dy)) / (len * len);
            const closestX = f.x + (dot * dx), closestY = f.y + (dot * dy);
            if (dot >= 0 && dot <= 1) {
                const dist = Math.sqrt(Math.pow(ball.x - closestX, 2) + Math.pow(ball.y - closestY, 2));
                if (dist < ball.radius + 8) {
                    const angle = f.angle + (f.side === 'left' ? -Math.PI/2 : Math.PI/2);
                    const speed = Math.abs(f.targetAngle - f.angle) * 60 + 12;
                    ball.vx = Math.cos(angle) * speed; ball.vy = Math.sin(angle) * speed;
                }
            }
        }

        function drawFlipper(f) {
            const tipX = f.x + Math.cos(f.angle) * f.length;
            const tipY = f.y + Math.sin(f.angle) * f.length;
            const color = f.side === 'left' ? getVar('--neon-cyan') : getVar('--neon-magenta');

            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = CONFIG.flipperWidth;
            ctx.lineCap = 'round';
            
            // Draw main flipper body
            ctx.beginPath();
            ctx.moveTo(f.x, f.y);
            ctx.lineTo(tipX, tipY);
            ctx.stroke();

            // Draw pivot point
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(f.x, f.y, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Walls
            ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2;
            walls.forEach(w => { ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke(); });
            
            // Bumpers
            bumpers.forEach(b => {
                ctx.shadowBlur = 15; ctx.shadowColor = b.color; ctx.fillStyle = b.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            });
            
            // Flippers
            drawFlipper(leftFlipper);
            drawFlipper(rightFlipper);
            
            // Ball
            ctx.shadowBlur = 10; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
        }

        let particlesArr = [];
        function createImpactParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particlesArr.push({ x, y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12, life: 1.0, color });
            }
        }

        function updateParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            particlesArr = particlesArr.filter(p => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                pCtx.globalAlpha = p.life; pCtx.fillStyle = p.color;
                pCtx.beginPath(); pCtx.arc(p.x, p.y, 2, 0, Math.PI * 2); pCtx.fill();
                return p.life > 0;
            });
            requestAnimationFrame(updateParticles);
        }
        updateParticles();

        function gameOver() {
            isPlaying = false;
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('hidden');
            document.querySelector('#overlay h1').innerHTML = `GAME OVER<br><span style="color:var(--neon-cyan); font-size: 1.5rem;">SCORE: ${score}</span>`;
        }
    </script>
</body>
</html>
