<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Hoops | Signal Share</title>
    <style>
        :root {
            --neon-orange: #ff7700;
            --neon-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1b2838 0%, #000 100%);
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        #gameUI {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .score-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .score-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.6;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--neon-orange);
            text-shadow: 0 0 10px rgba(255, 119, 0, 0.5);
            line-height: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }

        .play-btn {
            background: linear-gradient(to bottom, var(--neon-orange), #cc5500);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 119, 0, 0.4);
            margin-top: 20px;
            width: 250px;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .mode-btn {
            background: linear-gradient(to bottom, var(--neon-blue), #0088aa);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .stat-group {
            display: flex;
            gap: 15px;
        }

        #timer-box, #level-box {
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameUI">
        <div class="stat-group">
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">STREAK</div>
                <div class="score-value" id="streak" style="color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);">0</div>
            </div>
        </div>
        <div class="stat-group">
            <div class="score-box" id="level-box">
                <div class="score-label">LEVEL</div>
                <div class="score-value" id="level-val" style="color: #00ff9d; text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);">1</div>
            </div>
            <div class="score-box" id="timer-box">
                <div class="score-label">TIME</div>
                <div class="score-value" id="timer-val" style="color: #ff3e3e; text-shadow: 0 0 10px rgba(255, 62, 62, 0.5);">60</div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <h1 style="font-size: 4rem; margin: 0; color: var(--neon-orange); text-shadow: 0 0 20px rgba(255,119,0,0.6); letter-spacing: -2px; text-align: center;" id="menu-title">NEON HOOPS</h1>
        <p style="opacity: 0.7; font-size: 1.2rem; text-align: center; margin-top: 10px;" id="menu-sub">Select your game mode</p>
        
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px; align-items: center;">
            <div style="display: flex; gap: 10px;">
                <button class="play-btn" style="width: 150px;" onclick="startGame('classic')">CLASSIC</button>
                <button class="play-btn mode-btn" style="width: 150px;" onclick="startGame('timer')">TIMER</button>
                <button class="play-btn mode-btn" style="width: 150px; background: linear-gradient(to bottom, #75b022, #4a7015); box-shadow: 0 0 20px rgba(117, 176, 34, 0.4);" onclick="startGame('playoff')">PLAYOFF</button>
            </div>
            
            <div style="margin-top: 20px; text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 480px;">
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5; font-weight: 800; margin-bottom: 10px;">PHYSICS MODE</div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="play-btn" id="physics-arcade" style="margin-top:0; font-size: 0.8rem; padding: 10px; width: 140px; opacity: 0.5;" onclick="setPhysics('arcade')">ARCADE</button>
                    <button class="play-btn" id="physics-pro" style="margin-top:0; font-size: 0.8rem; padding: 10px; width: 140px;" onclick="setPhysics('pro')">PRO</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const timerValEl = document.getElementById('timer-val');
        const levelValEl = document.getElementById('level-val');
        const timerBox = document.getElementById('timer-box');
        const levelBox = document.getElementById('level-box');
        const menuTitle = document.getElementById('menu-title');
        const menuSub = document.getElementById('menu-sub');

        let width, height;
        let score = 0;
        let streak = 0;
        let isPlaying = false;
        let gameMode = 'classic';
        let physicsMode = 'pro';
        let timeLeft = 0;
        let level = 1;
        let targetScore = 0;
        let timerInterval = null;
        let bestScores = JSON.parse(localStorage.getItem('hoops-bests') || '{"classic":0,"timer":0,"playoff":0}');

        let mouseX = 0;
        let mouseY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let dragStartTime = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            hoop.x = width / 2;
            hoop.y = height * 0.3;
            if (ball.state === 'idle') resetBall();
        }
        window.addEventListener('resize', resize);

        const hoop = {
            x: 0, y: 0,
            radius: 45,
            boardWidth: 160,
            boardHeight: 100
        };

        const ball = {
            x: 0, y: 0, z: 1,
            vx: 0, vy: 0, vz: 0,
            radiusBase: 70,
            state: 'idle',
            rotation: 0, vRot: 0,
            isOnFire: false
        };

        const particles = [];

        function resetBall() {
            ball.x = width / 2;
            ball.y = height * 0.85;
            ball.z = 1;
            ball.vx = 0; ball.vy = 0; ball.vz = 0;
            ball.state = 'idle';
            ball.rotation = 0; ball.vRot = 0;
            ball.isOnFire = false;
            ball.isPerfect = false;
        }

        const messages = [];

        function showMessage(text, x, y, color = '#fff') {
            messages.push({
                text: text,
                x: x, y: y,
                life: 1.0,
                color: color,
                vy: -2
            });
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1, color: color
                });
            }
        }

        function update() {
            if (!isPlaying) return;

            if (ball.state === 'shooting' || ball.state === 'falling') {
                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.z += ball.vz;
                ball.vy += 1.2;
                ball.rotation += ball.vRot;

                if (ball.isOnFire && Math.random() > 0.3) {
                    particles.push({
                        x: ball.x + (Math.random() - 0.5) * ball.radiusBase * 0.5,
                        y: ball.y + (Math.random() - 0.5) * ball.radiusBase * 0.5,
                        vx: (Math.random() - 0.5) * 5, vy: -Math.random() * 5 - 2,
                        life: 0.8, color: Math.random() > 0.5 ? '#ff4400' : '#ffaa00'
                    });
                }

                if (ball.y > height + ball.radiusBase * 2 && ball.vy > 0) {
                    if (ball.state === 'shooting') streak = 0;
                    streakEl.textContent = streak;
                    resetBall();
                }

                if (ball.state === 'shooting' && ball.z <= 0.4 && ball.z >= 0.25) {
                    // Magnetic Hoop Effect: Subtle pull towards center as it approaches
                    let dx = ball.x - hoop.x;
                    let pullStrength = (physicsMode === 'arcade' ? 0.15 : 0.08);
                    ball.vx -= dx * pullStrength;
                }

                if (ball.state === 'shooting' && ball.z <= 0.35) {
                    ball.vz = 0;
                    let dx = ball.x - hoop.x;
                    let dy = ball.y - hoop.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // Increased swish radius for easier scoring
                    let swishRadius = physicsMode === 'arcade' ? hoop.radius * 3.2 : hoop.radius * 2.2;

                    if (dist < swishRadius) {
                        let isPerfectShot = ball.isPerfect && dist < hoop.radius * 0.4;
                        let points = isPerfectShot ? 10 : (ball.isOnFire ? 3 : (1 + Math.floor(streak / 2)));
                        
                        if (isPerfectShot) {
                            showMessage("PERFECT!", hoop.x, hoop.y - 40, "#ff00ff");
                            createParticles(hoop.x, hoop.y, "#ff00ff");
                            streak += 2;
                        } else {
                            streak++;
                            createParticles(hoop.x, hoop.y, ball.isOnFire ? '#ff4400' : '#00ff9d');
                        }

                        score += points;
                        scoreEl.textContent = score;
                        streakEl.textContent = streak;
                        
                        ball.state = 'falling';
                        ball.vx *= 0.5; ball.vy = 2;
                        ball.isOnFire = false;
                        ball.isPerfect = false;
                        
                        if (streak >= 3 && !ball.isOnFire) {
                             // Streak bonus or feedback?
                        }
                        if (gameMode === 'playoff' && score >= targetScore) nextLevel();
                    } else if (Math.abs(ball.y - (hoop.y - hoop.boardHeight / 2)) < hoop.boardHeight && Math.abs(dx) < hoop.boardWidth / 2) {
                        ball.state = 'falling';
                        ball.vy = -ball.vy * 0.4;
                        ball.vx = -ball.vx * 0.6 + (Math.random() - 0.5) * 3;
                        ball.vz = 0.05; ball.z = 0.32;
                        streak = 0; streakEl.textContent = streak;
                    } else if (dist < (physicsMode === 'arcade' ? hoop.radius * 4.2 : hoop.radius * 3.2)) {
                        // Forgiving Rim Logic: If it's a near miss, maybe it rolls in?
                        if (physicsMode === 'arcade' && Math.random() > 0.6) {
                            ball.vx = (hoop.x - ball.x) * 0.1;
                            ball.vy = 2;
                            ball.vz = -0.02;
                        } else {
                            ball.state = 'falling';
                            ball.vy = -ball.vy * 0.45;
                            ball.vx = (Math.random() - 0.5) * 6;
                            ball.vz = 0.04;
                        }
                        streak = 0; streakEl.textContent = streak;
                    } else {
                        ball.state = 'falling';
                        streak = 0; streakEl.textContent = streak;
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = messages.length - 1; i >= 0; i--) {
                let m = messages[i];
                m.y += m.vy; m.life -= 0.02;
                if (m.life <= 0) messages.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(0, 210, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < width; i += 40) {
                ctx.moveTo(i, 0); ctx.lineTo(width / 2 + (i - width / 2) * 2, height);
            }
            for (let i = 0; i < height; i += 40) {
                ctx.moveTo(0, i); ctx.lineTo(width, i + (height - i) * 0.2);
            }
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.strokeStyle = '#00d2ff';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#00d2ff'; ctx.shadowBlur = 10;
            ctx.fillRect(hoop.x - hoop.boardWidth / 2, hoop.y - hoop.boardHeight, hoop.boardWidth, hoop.boardHeight);
            ctx.strokeRect(hoop.x - hoop.boardWidth / 2, hoop.y - hoop.boardHeight, hoop.boardWidth, hoop.boardHeight);
            ctx.strokeRect(hoop.x - 30, hoop.y - 45, 60, 45);
            ctx.shadowBlur = 0;

            let currentRadius = Math.max(ball.radiusBase * 0.3, ball.radiusBase * (0.3 + 0.7 * ball.z));
            if (ball.z < 0.3) {
                drawBall(currentRadius); drawHoopRimBack();
            } else {
                drawHoopRimBack(); drawBall(currentRadius);
            }
            drawHoopRimFront();

            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            });

            messages.forEach(m => {
                ctx.fillStyle = m.color;
                ctx.globalAlpha = m.life;
                ctx.font = `bold ${24 + (1 - m.life) * 20}px Inter`;
                ctx.textAlign = 'center';
                ctx.shadowColor = m.color;
                ctx.shadowBlur = 15;
                ctx.fillText(m.text, m.x, m.y);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });

            if (isDragging && ball.state === 'idle') {
                ctx.strokeStyle = 'rgba(255, 119, 0, 0.5)';
                ctx.lineWidth = 4; ctx.setLineDash([10, 10]);
                ctx.beginPath(); ctx.moveTo(ball.x, ball.y);
                let dx = dragStartX - mouseX; let dy = dragStartY - mouseY;
                ctx.lineTo(ball.x - dx, ball.y - dy); ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function drawHoopRimBack() {
            ctx.strokeStyle = 'rgba(255, 50, 0, 0.5)'; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.ellipse(hoop.x, hoop.y, hoop.radius, hoop.radius / 2.5, 0, Math.PI, Math.PI * 2); ctx.stroke();
        }

        function drawHoopRimFront() {
            ctx.strokeStyle = '#ff3e3e'; ctx.lineWidth = 6;
            ctx.shadowColor = '#ff3e3e'; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.ellipse(hoop.x, hoop.y, hoop.radius, hoop.radius / 2.5, 0, 0, Math.PI); ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(hoop.x - hoop.radius, hoop.y);
            ctx.lineTo(hoop.x - hoop.radius / 2, hoop.y + 45); ctx.lineTo(hoop.x + hoop.radius / 2, hoop.y + 45);
            ctx.lineTo(hoop.x + hoop.radius, hoop.y);
            for (let i = -hoop.radius; i <= hoop.radius; i += 15) {
                ctx.moveTo(hoop.x + i, hoop.y); ctx.lineTo(hoop.x + i * 0.5, hoop.y + 45);
            }
            ctx.stroke();
        }

        function drawBall(radius) {
            ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.rotation);
            ctx.shadowColor = ball.isOnFire ? '#ff4400' : '#ff7700';
            ctx.shadowBlur = (ball.isOnFire ? 40 : 20) * ball.z;
            let grad = ctx.createRadialGradient(-radius / 3, -radius / 3, radius / 10, 0, 0, radius);
            if (ball.isOnFire) {
                grad.addColorStop(0, '#fff'); grad.addColorStop(0.5, '#ffcc00'); grad.addColorStop(1, '#ff4400');
            } else {
                grad.addColorStop(0, '#ffaa00'); grad.addColorStop(1, '#cc4400');
            }
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0; ctx.strokeStyle = '#331100'; ctx.lineWidth = Math.max(1, 4 * ball.z);
            ctx.beginPath(); ctx.moveTo(0, -radius); ctx.lineTo(0, radius); ctx.moveTo(-radius, 0); ctx.lineTo(radius, 0);
            ctx.moveTo(-radius, 0); ctx.quadraticCurveTo(-radius / 2, -radius / 2, 0, -radius);
            ctx.moveTo(radius, 0); ctx.quadraticCurveTo(radius / 2, radius / 2, 0, radius);
            ctx.stroke(); ctx.restore();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        function handleStart(x, y) {
            if (ball.state === 'idle') {
                isDragging = true; dragStartX = x; dragStartY = y; dragStartTime = Date.now();
                mouseX = x; mouseY = y;
            }
        }

        function handleMove(x, y) { if (isDragging) { mouseX = x; mouseY = y; } }

        function handleEnd() {
            if (isDragging && ball.state === 'idle') {
                isDragging = false;
                let dx = dragStartX - mouseX;
                let dy = dragStartY - mouseY;
                
                if (dy > 20) {
                    ball.state = 'shooting';
                    let dragDuration = (Date.now() - dragStartTime) / 1000;
                    
                    // User requested "halfway to the net" for perfect shot
                    let ballToHoopDist = ball.y - hoop.y;
                    let perfectDy = ballToHoopDist * 0.5;
                    let distFactor = dy / perfectDy;
                    
                    // User requested speed of 100ms to 500ms
                    // We'll use 0.3s as the "ideal" midpoint
                    let speedFactor = 0.3 / Math.max(dragDuration, 0.05);
                    
                    // Calculate power: combines distance and flick speed
                    // A power of ~1.0 should hit the hoop
                    let power = distFactor * (speedFactor * 0.4 + 0.6);
                    
                    // The "Perfect" Release Logic: Widened for easier triggers
                    let isPerfectRelease = Math.abs(distFactor - 1.0) < 0.22 && 
                                         dragDuration >= 0.05 && dragDuration <= 0.65 && 
                                         Math.abs(dx) < 35;
                    
                    if (isPerfectRelease) {
                        power = 1.0;
                        ball.isPerfect = true;
                        ball.isOnFire = true;
                    } else if (power > 0.82 && power < 1.18) {
                        // Widened soft snap for near-perfect shots
                        power = (power + 1.0) / 2;
                    }

                    // Map power to target Z (depth)
                    // Hoop is at 0.35, so 0.3 is a clean swish
                    let targetZ = 1.0 - (0.7 * power);
                    targetZ = Math.max(0.1, Math.min(0.9, targetZ));

                    // Target X (horizontal)
                    let targetX;
                    if (physicsMode === 'arcade') {
                        let deviation = Math.abs(dx);
                        // Even stronger aim assist: reduces horizontal error impact by 95% for small misses
                        let correction = ball.isPerfect ? 0 : (deviation < 120 ? 0.05 : 0.15);
                        targetX = hoop.x - (dx * correction);
                    } else {
                        targetX = hoop.x - dx * 2.5;
                    }

                    // Flight Time (t)
                    // Scales with drag duration so slow flicks = slow shots, fast = fast
                    // Fixed the "too fast" issue by setting a reasonable floor and range
                    let t = 0.6 + dragDuration * 1.2; 
                    t = Math.max(0.5, Math.min(1.8, t));

                    const gravity = 1.2;
                    let targetY = hoop.y;

                    // Projectile motion equations:
                    // vy = (targetY - ball.y - 0.5 * gravity * t^2) / t
                    ball.vx = (targetX - ball.x) / t;
                    ball.vy = (targetY - ball.y - 0.5 * gravity * t * t) / t;
                    ball.vz = (targetZ - 1.0) / t;
                    ball.vRot = dx * 0.05;
                    
                    if (!ball.isPerfect && Math.abs(dx) > 150) {
                        ball.isOnFire = true; // Still reward crazy bank shots or long range
                    }
                }
            }
        }

        window.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY), { passive: false });
        window.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        window.addEventListener('touchend', handleEnd);

        function startGame(mode) {
            gameMode = mode; overlay.style.opacity = '0';
            score = 0; streak = 0; level = 1;
            scoreEl.textContent = '0'; streakEl.textContent = '0';
            if (mode === 'timer') {
                timeLeft = 60; timerBox.style.display = 'block'; levelBox.style.display = 'none'; startCountdown();
            } else if (mode === 'playoff') {
                timeLeft = 30; targetScore = 5; timerBox.style.display = 'block'; levelBox.style.display = 'block'; levelValEl.textContent = '1'; startCountdown();
            } else {
                timerBox.style.display = 'none'; levelBox.style.display = 'none';
            }
            setTimeout(() => { overlay.style.display = 'none'; isPlaying = true; resize(); resetBall(); }, 300);
        }

        function setPhysics(mode) {
            physicsMode = mode;
            document.getElementById('physics-arcade').style.opacity = mode === 'arcade' ? '1' : '0.5';
            document.getElementById('physics-pro').style.opacity = mode === 'pro' ? '1' : '0.5';
        }

        function startCountdown() {
            if (timerInterval) clearInterval(timerInterval);
            timerValEl.textContent = timeLeft;
            timerInterval = setInterval(() => {
                if (!isPlaying) return;
                timeLeft--; timerValEl.textContent = timeLeft;
                if (timeLeft <= 0) gameOver();
            }, 1000);
        }

        function nextLevel() {
            level++; levelValEl.textContent = level; targetScore = 5 + (level * 5); timeLeft += 15;
            createParticles(width / 2, height / 2, '#00ff9d');
        }

        function gameOver() {
            isPlaying = false; clearInterval(timerInterval);
            if (score > bestScores[gameMode]) {
                bestScores[gameMode] = score; localStorage.setItem('hoops-bests', JSON.stringify(bestScores));
            }
            menuTitle.textContent = "GAME OVER";
            menuSub.textContent = `Mode: ${gameMode.toUpperCase()} | Score: ${score} | Best: ${bestScores[gameMode]}`;
            overlay.style.display = 'flex'; setTimeout(() => overlay.style.opacity = '1', 10);
        }

        resize(); loop();
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode'), physics = params.get('physics');
            if (physics) setPhysics(physics);
            if (mode) startGame(mode);
        });
    </script>
</body>
</html>
