<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Hoops | Signal Share</title>
    <link rel="stylesheet" href="./android-optimizations.css?v=1.0">
    <style>
        :root {
            --neon-orange: #ff7700;
            --neon-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1b2838 0%, #000 100%);
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        #gameUI {
            position: absolute;
            top: 72px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .score-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .score-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.6;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--neon-orange);
            text-shadow: 0 0 10px rgba(255, 119, 0, 0.5);
            line-height: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }

        .play-btn {
            background: linear-gradient(to bottom, var(--neon-orange), #cc5500);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 119, 0, 0.4);
            margin-top: 20px;
            width: 250px;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .mode-btn {
            background: linear-gradient(to bottom, var(--neon-blue), #0088aa);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .stat-group {
            display: flex;
            gap: 15px;
        }

        #timer-box, #level-box {
            display: none;
        }

        /* Signal Share Menu Bar Styles */
        .runner-header {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            padding: 12px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            z-index: 1000;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .close-runner {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .close-runner:hover {
            background: #ff3e3e;
            border-color: transparent;
        }

        .runner-title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .runner-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
        }

        .runner-title {
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="runner-header">
        <div class="runner-title-group">
            <img src="basketball_game_poster.png" class="runner-icon">
            <span class="runner-title">Neon Hoops</span>
        </div>
        <a href="mini-games.html" class="close-runner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            EXIT SESSION
        </a>
    </div>

    <div id="gameUI">
        <div class="stat-group">
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">STREAK</div>
                <div class="score-value" id="streak" style="color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);">0</div>
            </div>
        </div>
        <div class="stat-group">
            <div class="score-box" id="level-box">
                <div class="score-label">LEVEL</div>
                <div class="score-value" id="level-val" style="color: #00ff9d; text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);">1</div>
            </div>
            <div class="score-box" id="timer-box">
                <div class="score-label">TIME</div>
                <div class="score-value" id="timer-val" style="color: #ff3e3e; text-shadow: 0 0 10px rgba(255, 62, 62, 0.5);">60</div>
            </div>
        </div>
    </div>

    <div id="game-canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>


    <div id="overlay">
        <h1 style="font-size: 4rem; margin: 0; color: var(--neon-orange); text-shadow: 0 0 20px rgba(255,119,0,0.6); letter-spacing: -2px; text-align: center;" id="menu-title">NEON HOOPS</h1>
        <p style="opacity: 0.7; font-size: 1.2rem; text-align: center; margin-top: 10px;" id="menu-sub">Select your game mode</p>
        
        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 24px; align-items: center; width: 100%;">
            <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 100%;">
                <button class="play-btn" style="width: 140px; margin: 0;" onclick="startGame('classic')">CLASSIC</button>
                <button class="play-btn mode-btn" style="width: 140px; margin: 0;" onclick="startGame('timer')">TIMER</button>
                <button class="play-btn mode-btn" style="width: 140px; margin: 0; background: linear-gradient(to bottom, #75b022, #4a7015); box-shadow: 0 0 20px rgba(117, 176, 34, 0.4);" onclick="startGame('playoff')">PLAYOFF</button>
            </div>
            
            <div style="margin-top: 20px; text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 480px;">
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5; font-weight: 800; margin-bottom: 10px;">PHYSICS MODE</div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="play-btn" id="physics-arcade" style="margin-top:0; font-size: 0.8rem; padding: 10px; width: 140px; opacity: 0.5;" onclick="setPhysics('arcade')">ARCADE</button>
                    <button class="play-btn" id="physics-pro" style="margin-top:0; font-size: 0.8rem; padding: 10px; width: 140px;" onclick="setPhysics('pro')">PRO</button>
                </div>
            </div>
        </div>
    </div>

    <script src="basketball-game-v2.js?v=1.3"></script>
    <script>
        // Signal Share Android Optimization Suite - Detection
        (function() {
            const isNative = !!window.Capacitor && window.Capacitor.getPlatform() !== 'web';
            if (isNative || /Android/i.test(navigator.userAgent)) {
                document.documentElement.classList.add('platform-android');
            }
        })();

        // Standardize Signal Share Suite UI - Hide redundant header in App Runner
        if (window.self !== window.top) {
            const header = document.querySelector('.runner-header');
            const gameUI = document.getElementById('gameUI');
            if (header) header.style.display = 'none';
            if (gameUI) {
                gameUI.style.top = 'max(20px, var(--safe-area-top, 20px))';
                gameUI.style.paddingLeft = 'var(--safe-area-left, 0px)';
                gameUI.style.paddingRight = 'var(--safe-area-right, 0px)';
            }
        }
    </script>
</body>
</html>
