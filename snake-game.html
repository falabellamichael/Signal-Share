<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Neon Snake | Signal Share Arcade</title>
    <link rel="stylesheet" href="./questions-guide.css"> 
    <link rel="icon" href="./icons/icon.svg?v=5" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png?v=5" />
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-red: #ff3e3e;
            --neon-blue: #00d2ff;
            --surface: #08080b;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: 
                radial-gradient(circle at top left, rgba(0, 210, 255, 0.1), transparent 40%),
                radial-gradient(circle at bottom right, rgba(0, 255, 157, 0.08), transparent 40%),
                #08080b;
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: min(90vw, 420px);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 10px;
        }

        .game-title {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-pill {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 12px;
        }

        .stat-val {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
        }

        #gameCanvas {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            aspect-ratio: 1/1;
        }

        /* Overlay System */
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(8, 8, 11, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            border-radius: 24px;
            transition: opacity 0.3s ease;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-msg {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 8px;
            text-align: center;
            line-height: 1.1;
        }

        .overlay-sub {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 24px;
            font-size: 1rem;
        }

        .btn-primary {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            filter: brightness(0.9);
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: var(--glass);
            color: #fff;
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        /* Mobile Controls */
        .controls-pad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 12px;
            margin-top: 20px;
        }

        .control-btn {
            width: 64px;
            height: 64px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            -webkit-user-select: none;
            user-select: none;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
        }

        .control-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
            opacity: 0.8;
        }

        .btn-up { grid-area: up; }
        .btn-down { grid-area: down; }
        .btn-left { grid-area: left; }
        .btn-right { grid-area: right; }

        @media (min-width: 768px) {
            .controls-pad {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <h1 class="game-title">Neon Snake</h1>
                <div id="setting-badges" style="display: flex; gap: 6px; opacity: 0.4; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                <div class="stat-pill">
                    <span>Score <span class="stat-val" id="scoreVal">0</span></span>
                    <span>Best <span class="stat-val" id="bestVal">0</span></span>
                </div>
                <div style="display: flex; gap: 12px; opacity: 0.8; font-size: 0.75rem; font-weight: 700;">
                    <span>FOOD <span id="statFood" class="stat-val">0</span></span>
                    <span>LVL <span id="statSpeed" class="stat-val">1</span></span>
                </div>
            </div>
        </div>

        <div style="width: 100%; display: flex; gap: 15px; opacity: 0.6; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 0 10px;">
            <span>Time <span id="statTime">00:00</span></span>
            <span>Moves <span id="statMoves">0</span></span>
            <span>Streak <span id="statStreak">0</span></span>
        </div>

        <div style="position: relative; width: 100%;">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="overlay">
                <p class="overlay-msg" id="message">Neon Snake</p>
                <p class="overlay-sub" id="submessage">Tap Start to begin your run</p>
                <button class="btn-primary" id="startButton">Start Game</button>
            </div>
        </div>

        <div class="controls-pad">
            <div class="control-btn btn-up" id="ctrl-up">
                <svg viewBox="0 0 24 24"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/></svg>
            </div>
            <div class="control-btn btn-left" id="ctrl-left">
                <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
            </div>
            <div class="control-btn btn-right" id="ctrl-right">
                <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
            </div>
            <div class="control-btn btn-down" id="ctrl-down">
                <svg viewBox="0 0 24 24"><path d="M12 16l6-6-1.41-1.41L12 13.17 7.41 8.59 6 10z"/></svg>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px;">
            <a href="./mini-games.html" target="mini-games" class="btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Return to Library
            </a>
            <a href="./index.html" style="color: rgba(255,255,255,0.3); text-decoration: none; font-size: 0.75rem; font-weight: 500;">Back to Signal Share</a>
        </div>
    </div>

        <div class="questions-guide-footer" style="margin-top: 60px; text-align: center;">
            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
                <a href="./index.html" style="text-decoration: none; font-size: 0.8rem; color: rgba(255,255,255,0.6);">Back to Site</a>
                <a href="./how-to-guide.html" style="text-decoration: none; font-size: 0.8rem; color: rgba(255,255,255,0.6);">Back to How-To</a>
                <a href="./hero-player-deepdive.html" style="text-decoration: none; font-size: 0.8rem; color: rgba(255,255,255,0.6);">Back to Dev Tools</a>
            </div>
            <span style="opacity: 0.8;">Signal Share Engineering Documentation</span><br>
            <span style="opacity: 0.8;">&copy; 2026 Deep Dive Series</span>
        </div>
    </div>

    <script src="gameLogic.js"></script>
    <script>
        // Populate settings badges from URL
        document.addEventListener('DOMContentLoaded', () => {
            const p = new URLSearchParams(window.location.search);
            const badges = document.getElementById('setting-badges');
            
            const addBadge = (label, val) => {
                const s = document.createElement('span');
                s.textContent = `${label}: ${val}`;
                s.style.border = '1px solid rgba(255,255,255,0.1)';
                s.style.padding = '2px 6px';
                s.style.borderRadius = '4px';
                badges.appendChild(s);
            };

            if (p.has('grid')) addBadge('Grid', p.get('grid') === '20' ? 'Standard' : (p.get('grid') === '40' ? 'Tiny' : 'Dense'));
            if (p.has('obstacles')) addBadge('Mode', p.get('obstacles'));
            if (p.has('wallwrap')) addBadge('Walls', p.get('wallwrap') === '1' ? 'Wrap' : 'Solid');
        });
    </script>
</body>
</html>
