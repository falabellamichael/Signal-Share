<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #f5f7fa;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .chat-header {
      padding: 16px 20px;
      background-color: #f5f7fa;
      border-bottom: 1px solid #e4e8eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header h1 {
      font-size: 16px;
      color: #333;
      margin-right: 12px;
    }

    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: #4caf50;
      border-radius: 50%;
      margin-left: 8px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 12px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.ai {
      align-self: flex-start;
      background-color: #e8f5e9;
      border-top-left-radius: 4px;
      border-bottom-right-radius: 4px;
    }

    .message.user {
      align-self: flex-end;
      background-color: #fff3cd;
      border-top-right-radius: 4px;
      border-bottom-left-radius: 4px;
    }

    .message .role-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
      display: block;
    }

    .chat-input-area {
      padding: 16px 20px;
      background-color: #f5f7fa;
      border-top: 1px solid #e4e8eb;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
      transition: box-shadow 0.2s ease;
    }

    input[type="text"]:focus {
      box-shadow: 0 0 0 3px rgba(79, 175, 87, 0.4);
    }

    .send-btn {
      background-color: #4caf50;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s ease;
    }

    .send-btn:hover {
      background-color: #45a046;
    }

    .gpu-usage {
      position: absolute;
      top: 80px;
      right: 16px;
      font-size: 12px;
      color: #666;
      background-color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .gpu-usage span {
      display: block;
      margin-top: 2px;
    }

    .loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: #666;
      display: none;
    }

    .loading-indicator.active {
      display: block;
    }

    .typing-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: #666;
      display: none;
    }

    .typing-indicator.active {
      display: block;
    }

    .chat-input-area input[type="text"] {
      width: 100%;
    }

    @media (max-width: 768px) {
      .chat-container {
        height: 95vh;
      }

      .message {
        max-width: 90%;
      }

      .gpu-usage {
        top: 120px;
        right: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>AI Chatbot</h1>
      <span class="status-indicator"></span>
    </div>

    <div class="gpu-usage" id="gpuUsage">
      GPU: 0% | VRAM: 0MB
    </div>

    <div class="chat-messages" id="messagesContainer">
      <div class="message ai">Hello! How can I help you today?</div>
    </div>

    <div class="loading-indicator" id="loadingIndicator">Loading...</div>
    <div class="typing-indicator" id="typingIndicator"></div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off"/>
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const typingIndicator = document.getElementById('typingIndicator');
    const gpuUsageEl = document.getElementById('gpuUsage');

    let currentAiResponse = null;
    let isTyping = false;
    let aiIntervalId = null;

    function updateGpuUsage() {
      // Simulate GPU usage based on message length (mock data)
      const mockVramUsage = Math.floor(Math.random() * 1024);
      gpuUsageEl.innerHTML = `GPU: ${Math.round((mockVramUsage / 512) * 100)}% | VRAM: ${mockVramUsage}MB`;
    }

    function addMessage(role, text) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      messageDiv.innerHTML = `<span class="role-label">${role === 'ai' ? 'AI Assistant' : 'You'}</span>${text.replace(/\n/g, '<br>')}</span>`;
      messagesContainer.appendChild(messageDiv);

      // Scroll to bottom
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showLoading() {
      loadingIndicator.classList.add('active');
      typingIndicator.classList.remove('active');
    }

    function hideLoading() {
      loadingIndicator.classList.remove('active');
      typingIndicator.classList.remove('active');
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      // Add user message
      addMessage('user', text);
      messageInput.value = '';
      hideLoading();

      // Show loading indicator
      showLoading();

      // Simulate AI response delay (mock)
      await new Promise(resolve => setTimeout(resolve, 1000));

      // Mock AI response based on input length
      const mockResponse = `Here's a helpful answer to your question: ${text.substring(0, 50)}...`;

      addMessage('ai', mockResponse);
      currentAiResponse = mockResponse;
    }

    function startTyping() {
      isTyping = true;
      typingIndicator.classList.add('active');
      hideLoading();

      // Simulate AI response delay (mock)
      setTimeout(() => {
        isTyping = false;
        typingIndicator.classList.remove('active');
        addMessage('ai', currentAiResponse);
        currentAiResponse = null;
      }, 1500);
    }

    // Auto-scroll to bottom on new message
    messagesContainer.addEventListener('scroll', () => {
      if (messagesContainer.scrollTop === messagesContainer.scrollHeight) {
        messagesContainer.scrollTop = messagesContainer.scrollHeight - 20;
      }
    });

    // Send message when Enter key is pressed
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-update GPU usage every second
    setInterval(updateGpuUsage, 1000);
  </script>
</body>
</html>
