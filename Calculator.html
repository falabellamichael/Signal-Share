<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Calculator | Signal Share Suite</title>
    <link rel="stylesheet" href="./questions-guide.css">
    <style>
        :root {
            --bg: #08080b;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #66c0f4;
            --accent-glow: rgba(102, 192, 244, 0.3);
            --danger: #ff3e3e;
            --success: #00ff9d;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: #fff;
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 15px;
            gap: 30px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 800;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-left: 12px;
            margin-bottom: 8px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--glass);
            color: #fff;
        }

        .nav-item.active {
            border-left: 3px solid var(--accent);
            background: linear-gradient(to right, rgba(102, 192, 244, 0.1), transparent);
        }

        /* Main Workspace */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            position: relative;
        }

        .calc-wrapper {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 40px;
            height: 100%;
        }

        /* Calculator Display */
        .display-container {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: right;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
        }

        .history-line {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.3);
            min-height: 1.2em;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .main-line {
            font-size: 3rem;
            font-weight: 700;
            word-break: break-all;
            line-height: 1.1;
        }

        /* Controls Grid */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .btn {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .btn.operator { color: var(--accent); font-weight: 800; font-size: 1.2rem; }
        .btn.function { color: var(--success); font-size: 0.85rem; }
        .btn.clear { color: var(--danger); }
        .btn.equals { 
            background: var(--accent); 
            color: #000; 
            font-weight: 900; 
            grid-column: span 2; 
        }
        .btn.equals:hover { filter: brightness(1.1); }

        /* History Panel */
        .history-panel {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            height: calc(100% - 20px);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-item {
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .history-item:hover .hist-expr { color: var(--accent); }
        
        .hist-expr { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
        .hist-res { font-size: 1.1rem; font-weight: 700; color: #fff; }

        /* Converter Styles */
        .converter-panel {
            display: none;
            flex-direction: column;
            gap: 25px;
        }

        .conv-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .conv-input-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .conv-input-box input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            width: 100%;
            outline: none;
            font-weight: 700;
        }

        .conv-input-box select {
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 800;
            margin-top: 10px;
            outline: none;
        }

        /* Utilities */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="padding: 0 12px; margin-bottom: 10px;">
            <h2 style="font-size: 1.2rem; margin: 0; letter-spacing: -0.5px;">Super Calculator</h2>
            <p style="font-size: 0.7rem; opacity: 0.4; margin-top: 4px;">SIGNAL SHARE UTILITY</p>
        </div>

        <div class="nav-group">
            <span class="nav-label">Calculator</span>
            <div class="nav-item active" onclick="setMode('standard')">Standard</div>
            <div class="nav-item" onclick="setMode('scientific')">Scientific</div>
            <div class="nav-item" onclick="setMode('programmer')">Programmer</div>
        </div>

        <div class="nav-group">
            <span class="nav-label">Converters</span>
            <div class="nav-item" onclick="setMode('length')">Length</div>
            <div class="nav-item" onclick="setMode('weight')">Weight</div>
            <div class="nav-item" onclick="setMode('temp')">Temperature</div>
        </div>

        <div style="margin-top: auto; padding: 12px;">
            <a href="./mini-games.html" style="text-decoration: none; font-size: 0.75rem; color: var(--accent);">← Return to Library</a>
        </div>
    </aside>

    <main class="workspace">
        <div class="calc-wrapper">
            <div id="calculator-ui">
                <div class="display-container">
                    <div id="history-line" class="history-line"></div>
                    <div id="main-line" class="main-line">0</div>
                </div>

                <div id="standard-grid" class="controls-grid">
                    <button class="btn function" onclick="mem('MC')">MC</button>
                    <button class="btn function" onclick="mem('MR')">MR</button>
                    <button class="btn function" onclick="mem('M+')">M+</button>
                    <button class="btn function" onclick="mem('M-')">M-</button>
                    <button class="btn clear" onclick="clearAll()">AC</button>

                    <button class="btn function" onclick="op('sqrt')">√</button>
                    <button class="btn function" onclick="op('sqr')">x²</button>
                    <button class="btn function" onclick="op('inv')">1/x</button>
                    <button class="btn operator" onclick="append('/')">÷</button>
                    <button class="btn clear" onclick="backspace()">⌫</button>

                    <button class="btn" onclick="append('7')">7</button>
                    <button class="btn" onclick="append('8')">8</button>
                    <button class="btn" onclick="append('9')">9</button>
                    <button class="btn operator" onclick="append('*')">×</button>
                    <button class="btn function" onclick="op('abs')">|x|</button>

                    <button class="btn" onclick="append('4')">4</button>
                    <button class="btn" onclick="append('5')">5</button>
                    <button class="btn" onclick="append('6')">6</button>
                    <button class="btn operator" onclick="append('-')">−</button>
                    <button class="btn function" onclick="op('fact')">n!</button>

                    <button class="btn" onclick="append('1')">1</button>
                    <button class="btn" onclick="append('2')">2</button>
                    <button class="btn" onclick="append('3')">3</button>
                    <button class="btn operator" onclick="append('+')">+</button>
                    <button class="btn function" onclick="append('Math.PI')">π</button>

                    <button class="btn" onclick="op('neg')">±</button>
                    <button class="btn" onclick="append('0')">0</button>
                    <button class="btn" onclick="append('.')">.</button>
                    <button class="btn equals" onclick="calculate()">=</button>
                </div>

                <div id="scientific-grid" class="controls-grid" style="display: none;">
                    <!-- Expanded scientific buttons -->
                </div>
            </div>

            <div class="history-panel">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.8rem; font-weight: 800; opacity: 0.5;">HISTORY</span>
                    <span style="font-size: 0.7rem; color: var(--danger); cursor: pointer;" onclick="clearHistory()">Clear</span>
                </div>
                <div id="history-list" class="history-list">
                    <!-- History items -->
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentExpr = '';
        let lastResult = null;
        let memory = 0;
        let history = JSON.parse(localStorage.getItem('calc-history') || '[]');

        const mainLine = document.getElementById('main-line');
        const histLine = document.getElementById('history-line');
        const histList = document.getElementById('history-list');

        function append(char) {
            if (lastResult !== null && !isOperator(char)) {
                currentExpr = char;
                lastResult = null;
            } else {
                currentExpr += char;
            }
            updateDisplay();
        }

        function isOperator(c) {
            return ['+', '-', '*', '/'].includes(c);
        }

        function updateDisplay() {
            mainLine.textContent = currentExpr || '0';
            if (mainLine.textContent.length > 10) mainLine.style.fontSize = '2rem';
            else mainLine.style.fontSize = '3rem';
        }

        function clearAll() {
            currentExpr = '';
            lastResult = null;
            histLine.textContent = '';
            updateDisplay();
        }

        function backspace() {
            currentExpr = currentExpr.slice(0, -1);
            updateDisplay();
        }

        function calculate() {
            try {
                // Use a safer alternative to eval for math
                const result = Function('"use strict";return (' + currentExpr.replace(/×/g, '*').replace(/÷/g, '/') + ')')();
                histLine.textContent = currentExpr + ' =';
                
                // Add to history
                const item = { expr: currentExpr, res: result };
                history.unshift(item);
                if (history.length > 50) history.pop();
                localStorage.setItem('calc-history', JSON.stringify(history));
                renderHistory();

                currentExpr = result.toString();
                lastResult = result;
                updateDisplay();
            } catch (e) {
                mainLine.textContent = 'Error';
                setTimeout(clearAll, 1000);
            }
        }

        function op(type) {
            let val = parseFloat(currentExpr || '0');
            switch(type) {
                case 'sqrt': val = Math.sqrt(val); break;
                case 'sqr': val = val * val; break;
                case 'inv': val = 1 / val; break;
                case 'abs': val = Math.abs(val); break;
                case 'neg': val = -val; break;
                case 'fact': val = factorial(val); break;
            }
            currentExpr = val.toString();
            updateDisplay();
        }

        function factorial(n) {
            if (n < 0) return 'Error';
            if (n === 0) return 1;
            let res = 1;
            for (let i = 2; i <= n; i++) res *= i;
            return res;
        }

        function mem(type) {
            let val = parseFloat(currentExpr || '0');
            switch(type) {
                case 'MC': memory = 0; break;
                case 'MR': currentExpr = memory.toString(); break;
                case 'M+': memory += val; break;
                case 'M-': memory -= val; break;
            }
            updateDisplay();
        }

        function renderHistory() {
            histList.innerHTML = history.map((h, i) => `
                <div class="history-item" onclick="loadHistory(${i})">
                    <div class="hist-expr">${h.expr}</div>
                    <div class="hist-res">${h.res}</div>
                </div>
            `).join('');
        }

        function loadHistory(i) {
            currentExpr = history[i].res.toString();
            updateDisplay();
        }

        function clearHistory() {
            history = [];
            localStorage.setItem('calc-history', '[]');
            renderHistory();
        }

        function setMode(mode) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            // This is a POC for mode switching, standard grid is default
        }

        renderHistory();
    </script>
</body>
</html>
